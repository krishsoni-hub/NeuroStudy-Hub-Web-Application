<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — NeuroStudy Hub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-container">
    <a href="index.html" class="auth-logo">Neuro<span>Study</span> Hub</a>

    <div class="auth-card" id="resetCard">
      <h2>Set new password</h2>
      <p class="auth-sub">Enter your new password below</p>

      <div id="resetAlert" class="form-alert" style="display:none"></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Min. 6 characters" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" data-target="newPassword">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="newPasswordErr"></span>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat new password" autocomplete="new-password" required />
          <span class="field-error" id="confirmPasswordErr"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Reset Password</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Read token from URL
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('resetCard').innerHTML = `
        <div style="text-align:center;padding:20px">
          <div style="font-size:40px;margin-bottom:16px">⚠️</div>
          <h2>Invalid Link</h2>
          <p style="color:var(--text-muted);margin:12px 0 20px">This reset link is missing a token. Please request a new one.</p>
          <a href="login.html" class="btn btn-primary">Back to Sign In</a>
        </div>`;
    }

    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (input) input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('resetAlert');
      el.textContent = msg;
      el.className = `form-alert form-alert-${type}`;
      el.style.display = 'flex';
    }
    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
    }

    document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      showFieldError('newPasswordErr', '');
      showFieldError('confirmPasswordErr', '');

      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('resetBtn');

      let valid = true;
      if (!password || password.length < 6) { showFieldError('newPasswordErr', 'Password must be at least 6 characters'); valid = false; }
      if (password !== confirm)              { showFieldError('confirmPasswordErr', 'Passwords do not match'); valid = false; }
      if (!valid) return;

      UI.setLoading(btn, true, 'Resetting...');
      try {
        const data = await AuthAPI.resetPassword(token, password);
        if (!data) {
          showAlert('Cannot reach the server. Make sure the backend is running.');
          return;
        }
        showAlert(data.message || 'Password reset successfully!', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showAlert(err.message);
      } finally {
        UI.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
