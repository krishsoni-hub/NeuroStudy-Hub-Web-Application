<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tools Marketplace — NeuroStudy Hub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/marketplace.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><a href="index.html">Neuro<span>Study</span></a></div>
    <nav class="sidebar-nav">
      <div class="nav-group">
        <span class="nav-group-label">Main</span>
        <a href="dashboard.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="marketplace.html" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
          AI Tools
        </a>
        <a href="tool.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Summarizer
        </a>
        <a href="#" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Smart Notes
        </a>
      </div>
      <div class="nav-group">
        <span class="nav-group-label">Account</span>
        <a href="profile.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-mini">
        <div class="user-avatar">JS</div>
        <div class="user-info"><span class="user-name">John Student</span><span class="user-plan">Pro Plan</span></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search 100+ AI tools..." />
      </div>
      <div class="topbar-right">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
        <a href="profile.html" class="user-avatar-btn">JS</a>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>AI Tools Marketplace</h1>
          <p class="page-subtitle">Discover and use <span id="toolCount">100+</span> powerful AI tools.</p>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="marketplace-filters">
        <div class="filter-scroll">
          <button class="filter-btn active" data-cat="all">All Tools</button>
          <button class="filter-btn" data-cat="writing">✍️ Writing</button>
          <button class="filter-btn" data-cat="research">🔍 Research</button>
          <button class="filter-btn" data-cat="coding">💻 Coding</button>
          <button class="filter-btn" data-cat="math">🧮 Math</button>
          <button class="filter-btn" data-cat="language">🌐 Language</button>
          <button class="filter-btn" data-cat="productivity">⚡ Productivity</button>
          <button class="filter-btn" data-cat="creative">🎨 Creative</button>
          <button class="filter-btn" data-cat="science">🔬 Science</button>
          <button class="filter-btn" data-cat="business">💼 Business</button>
        </div>
      </div>

      <!-- TOOLS GRID -->
      <div class="tools-grid" id="toolsGrid"></div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination">
        <button class="page-btn" id="prevBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Previous
        </button>
        <div class="page-numbers" id="pageNumbers"></div>
        <button class="page-btn" id="nextBtn">
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- FLOATING AI BUTTON -->
  <button class="ai-fab" id="aiFab" title="Open AI Tools">
    <div class="rhombus-inner">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <div class="fab-ring"></div>
  </button>

  <div class="ai-panel" id="aiPanel">
    <div class="ai-panel-header">
      <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> AI Assistant</h3>
      <button class="panel-close" id="panelClose"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="ai-panel-tools">
      <a href="tool.html?tool=Summarizer&icon=%F0%9F%93%84" class="panel-tool">📄 Summarizer</a>
      <a href="tool.html" class="panel-tool">✍️ Essay Writer</a>
      <a href="tool.html" class="panel-tool">🧠 Flashcard Gen</a>
      <a href="tool.html" class="panel-tool">🔍 Research Helper</a>
      <a href="tool.html" class="panel-tool">💻 Code Assistant</a>
      <a href="tool.html" class="panel-tool">🌐 Translator</a>
    </div>
    <div class="ai-panel-footer">
      <a href="marketplace.html" class="btn btn-primary" style="width:100%;justify-content:center;">View All 100+ Tools</a>
    </div>
  </div>
  <div class="panel-overlay" id="panelOverlay"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/marketplace.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      UI.populateSidebar();
    });
  </script>
</body>
</html>
